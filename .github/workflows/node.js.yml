name: CI

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: echo "approve-builds=true" >> .npmrc

      - run: rm pnpm-lock.yaml

      - run: pnpm approve-builds --yes
 
      - run: pnpm install

      - run: pnpm build